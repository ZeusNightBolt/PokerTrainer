<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hold'em Trainer logo">
  <defs>
    <radialGradient id="felt" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#2a8f63"/>
      <stop offset="55%" stop-color="#0f5638"/>
      <stop offset="100%" stop-color="#083a27"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="55%" stop-color="#e7c45a"/>
      <stop offset="100%" stop-color="#b9963f"/>
    </linearGradient>
  </defs>
  <!-- chip body -->
  <circle cx="32" cy="32" r="30" fill="url(#felt)" stroke="url(#gold)" stroke-width="3"/>
  <!-- edge spots -->
  <g fill="url(#gold)">
    <g id="spot"><rect x="29" y="1.5" width="6" height="8" rx="2"/></g>
    <use href="#spot" transform="rotate(45 32 32)"/>
    <use href="#spot" transform="rotate(90 32 32)"/>
    <use href="#spot" transform="rotate(135 32 32)"/>
    <use href="#spot" transform="rotate(180 32 32)"/>
    <use href="#spot" transform="rotate(225 32 32)"/>
    <use href="#spot" transform="rotate(270 32 32)"/>
    <use href="#spot" transform="rotate(315 32 32)"/>
  </g>
  <!-- inner ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#gold)" stroke-width="1.6" opacity="0.55"/>
  <!-- spade -->
  <path fill="url(#gold)" d="M32 15
    C 26 25, 14 29, 14 38
    C 14 44.5, 21.5 47, 27 42.2
    C 26 46.5, 23.8 49, 21 50.2
    L 43 50.2
    C 40.2 49, 38 46.5, 37 42.2
    C 42.5 47, 50 44.5, 50 38
    C 50 29, 38 25, 32 15 Z"/>
</svg>
